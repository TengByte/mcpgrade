name: "mcpgrade"
description: "Lint your MCP server for agent usability — descriptions, schema design, naming, token cost"
branding:
  icon: "check-circle"
  color: "blue"
inputs:
  target:
    description: "Server target: http(s) URL, stdio command, or snapshot .json path"
    required: true
  fail-on:
    description: "Fail the job on findings at/above this severity (error|warn|info)"
    required: false
    default: "error"
  args:
    description: "Extra CLI flags, e.g. --disable S008 --config .mcpgraderc.json"
    required: false
    default: ""
runs:
  using: "composite"
  steps:
    - name: Run mcpgrade
      shell: bash
      run: |
        npx --yes mcpgrade "${{ inputs.target }}" --fail-on "${{ inputs.fail-on }}" ${{ inputs.args }}
